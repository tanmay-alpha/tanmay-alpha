<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF2E63"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .t{font:800 36px Segoe UI,Arial;fill:#fff}
      .s{font:600 17px Segoe UI,Arial;fill:#b8c7ff}
      .b{fill:url(#g);filter:url(#glow)}
    </style>
  </defs>
  <rect width="1000" height="520" rx="34" fill="#060814"/>
  <text x="500" y="60" class="t" text-anchor="middle">ðŸŒŒ 3D Contribution Universe</text>
  <text x="500" y="94" class="s" text-anchor="middle">Fallback is visible now. GitHub Action will replace this with live contribution 3D SVG.</text>

  <g transform="translate(170 120)">
    <g transform="skewX(-28) scale(1 .72)">
      <rect x="0" y="0" width="660" height="300" rx="22" fill="#0d1228" stroke="#25335c"/>
      <g opacity=".35">
        <path d="M0 50H660M0 100H660M0 150H660M0 200H660M0 250H660" stroke="#4f5f98"/>
        <path d="M60 0V300M120 0V300M180 0V300M240 0V300M300 0V300M360 0V300M420 0V300M480 0V300M540 0V300M600 0V300" stroke="#4f5f98"/>
      </g>
    </g>

    <g filter="url(#glow)">
      <rect class="b" x="60" y="245" width="28" height="55" rx="5">
        <animate attributeName="height" values="55;120;55" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="245;180;245" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="130" y="210" width="28" height="90" rx="5">
        <animate attributeName="height" values="90;150;90" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="210;150;210" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="200" y="160" width="28" height="140" rx="5">
        <animate attributeName="height" values="140;210;140" dur="3.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="160;90;160" dur="3.4s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="270" y="230" width="28" height="70" rx="5">
        <animate attributeName="height" values="70;130;70" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="230;170;230" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="340" y="135" width="28" height="165" rx="5">
        <animate attributeName="height" values="165;230;165" dur="3.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="135;70;135" dur="3.1s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="410" y="190" width="28" height="110" rx="5">
        <animate attributeName="height" values="110;180;110" dur="2.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="190;120;190" dur="2.9s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="480" y="150" width="28" height="150" rx="5">
        <animate attributeName="height" values="150;210;150" dur="3.3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="150;90;150" dur="3.3s" repeatCount="indefinite"/>
      </rect>
      <rect class="b" x="550" y="220" width="28" height="80" rx="5">
        <animate attributeName="height" values="80;160;80" dur="2.7s" repeatCount="indefinite"/>
        <animate attributeName="y" values="220;140;220" dur="2.7s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <text x="500" y="475" class="s" text-anchor="middle">Run Actions â†’ GitHub Profile 3D Contribution â†’ Run workflow</text>
</svg>

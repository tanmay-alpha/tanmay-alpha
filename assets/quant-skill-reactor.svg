<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="qbg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1f3e"/>
      <stop offset="40%" stop-color="#0c0f1e"/>
      <stop offset="100%" stop-color="#040509"/>
    </radialGradient>

    <radialGradient id="coreBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#060c1a"/>
    </radialGradient>

    <linearGradient id="neonCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>

    <linearGradient id="neonViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>

    <linearGradient id="neonAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 900 28px 'Segoe UI', 'Arial', sans-serif;
        fill: #ffffff;
        letter-spacing: 4px;
      }
      .subtitle {
        font: 600 12px 'Segoe UI', 'Arial', sans-serif;
        fill: #00D9FF;
        letter-spacing: 3px;
      }
      .langLabel {
        font: 800 14px 'Segoe UI', 'Arial', sans-serif;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .domainLabel {
        font: 700 11px 'Segoe UI', 'Arial', sans-serif;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .coreTitle {
        font: 900 20px 'Segoe UI', 'Arial', sans-serif;
        fill: #00D9FF;
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 2px;
      }
      .coreSub {
        font: 600 10px 'Segoe UI', 'Arial', sans-serif;
        fill: #6C63FF;
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 2px;
      }
      .scanLabel {
        font: 600 10px 'Segoe UI', 'Arial', sans-serif;
        fill: #00D9FF;
        opacity: 0.6;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" rx="20" fill="url(#qbg)"/>

  <!-- Grid lines - horizontal -->
  <g opacity="0.06" stroke="#00D9FF" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
  </g>
  <!-- Grid lines - vertical -->
  <g opacity="0.04" stroke="#6C63FF" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="840" y1="0" x2="840" y2="500"/>
    <line x1="960" y1="0" x2="960" y2="500"/>
    <line x1="1080" y1="0" x2="1080" y2="500"/>
  </g>

  <!-- Corner accent marks -->
  <g stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.5">
    <path d="M20 40 L20 20 L40 20"/>
    <path d="M1160 40 L1160 20 L1140 20"/>
    <path d="M20 460 L20 480 L40 480"/>
    <path d="M1160 460 L1160 480 L1140 480"/>
  </g>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#sweepGrad)" opacity="0.6">
    <animate attributeName="y" values="0;498;0" dur="6s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Title -->
  <text x="600" y="42" class="title" text-anchor="middle" filter="url(#glow)">TANMAY QUANT SKILL REACTOR</text>
  <text x="600" y="62" class="subtitle" text-anchor="middle">LANGUAGES + DOMAINS + SYSTEMS IN ORBIT</text>

  <!-- Decorative line under title -->
  <line x1="300" y1="72" x2="900" y2="72" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>

  <!-- Outer orbit ellipse (languages) - counter-clockwise slow -->
  <ellipse cx="600" cy="280" rx="390" ry="175" fill="none" stroke="#00D9FF" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 600 280" to="-360 600 280" dur="60s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Middle orbit ellipse -->
  <ellipse cx="600" cy="280" rx="270" ry="120" fill="none" stroke="#6C63FF" stroke-width="1" stroke-dasharray="6 10" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="0 600 280" to="360 600 280" dur="40s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Inner orbit ellipse (domains) -->
  <ellipse cx="600" cy="280" rx="155" ry="70" fill="none" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="360 600 280" to="0 600 280" dur="25s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ================================ -->
  <!-- OUTER ORBIT: LANGUAGES (slow, 48s) -->
  <!-- 9 nodes evenly around ellipse cx=600 cy=280 rx=390 ry=175 -->
  <!-- Angles: 0=right, 90=bottom, 180=left, 270=top -->
  <!-- Positions at angle a: x=600+390*cos(a), y=280+175*sin(a) -->
  <!-- Python: 0deg -> (990,280), C++: 40deg -> (898,392), Java: 80deg -> (668,452) -->
  <!-- JS: 120deg -> (405,432), TS: 160deg -> (233,340), React: 200deg -> (234,220) -->
  <!-- Next.js: 240deg -> (405,128), FastAPI: 280deg -> (668,106), SQL: 320deg -> (898,168) -->
  <!-- ================================ -->

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 600 280" to="360 600 280" dur="48s" repeatCount="indefinite"/>

    <!-- Python @ 0deg (990, 280) -->
    <g transform="translate(990 280)" filter="url(#softGlow)">
      <rect x="-38" y="-18" width="76" height="36" rx="10" fill="#3776AB" stroke="#4a9ee0" stroke-width="1.5"/>
      <text class="langLabel" y="1">Python</text>
    </g>

    <!-- C++ @ 40deg (898, 392) -->
    <g transform="translate(898 392)" filter="url(#softGlow)">
      <rect x="-32" y="-18" width="64" height="36" rx="10" fill="#00599C" stroke="#0077cc" stroke-width="1.5"/>
      <text class="langLabel" y="1">C++</text>
    </g>

    <!-- Java @ 80deg (668, 452) -->
    <g transform="translate(668 452)" filter="url(#softGlow)">
      <rect x="-30" y="-18" width="60" height="36" rx="10" fill="#ED8B00" stroke="#ffa500" stroke-width="1.5"/>
      <text class="langLabel" y="1">Java</text>
    </g>

    <!-- JavaScript @ 120deg (405, 432) -->
    <g transform="translate(405 432)" filter="url(#softGlow)">
      <rect x="-32" y="-18" width="64" height="36" rx="10" fill="#F7DF1E" stroke="#d4b800" stroke-width="1.5"/>
      <text class="langLabel" fill="#111827" y="1">JS</text>
    </g>

    <!-- TypeScript @ 160deg (233, 340) -->
    <g transform="translate(233 340)" filter="url(#softGlow)">
      <rect x="-32" y="-18" width="64" height="36" rx="10" fill="#3178C6" stroke="#4a90e2" stroke-width="1.5"/>
      <text class="langLabel" y="1">TS</text>
    </g>

    <!-- React @ 200deg (234, 220) -->
    <g transform="translate(234 220)" filter="url(#softGlow)">
      <rect x="-34" y="-18" width="68" height="36" rx="10" fill="#0a1929" stroke="#61DAFB" stroke-width="1.5"/>
      <text class="langLabel" fill="#61DAFB" y="1">React</text>
    </g>

    <!-- Next.js @ 240deg (405, 128) -->
    <g transform="translate(405 128)" filter="url(#softGlow)">
      <rect x="-38" y="-18" width="76" height="36" rx="10" fill="#111111" stroke="#ffffff" stroke-width="1.5"/>
      <text class="langLabel" y="1">Next.js</text>
    </g>

    <!-- FastAPI @ 280deg (668, 106) -->
    <g transform="translate(668 106)" filter="url(#softGlow)">
      <rect x="-40" y="-18" width="80" height="36" rx="10" fill="#009688" stroke="#00bfa5" stroke-width="1.5"/>
      <text class="langLabel" y="1">FastAPI</text>
    </g>

    <!-- SQL @ 320deg (898, 168) -->
    <g transform="translate(898 168)" filter="url(#softGlow)">
      <rect x="-28" y="-18" width="56" height="36" rx="10" fill="#336791" stroke="#4a90a4" stroke-width="1.5"/>
      <text class="langLabel" y="1">SQL</text>
    </g>
  </g>

  <!-- ================================ -->
  <!-- INNER ORBIT: DOMAIN NODES (faster, 22s reverse) -->
  <!-- Around cx=600 cy=280 rx=155 ry=70 -->
  <!-- 7 nodes: 0,51,103,154,206,257,309 deg -->
  <!-- AI/ML: 0 -> (755,280), FinTech: 51 -> (697,334) -->
  <!-- Trading: 103 -> (565,348), Market Data: 154 -> (461,311) -->
  <!-- APIs: 206 -> (461,249), Risk: 257 -> (565,212), Automation: 309 -> (697,226) -->
  <!-- ================================ -->

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 600 280" to="-360 600 280" dur="22s" repeatCount="indefinite"/>

    <!-- AI/ML @ 0deg -->
    <g transform="translate(755 280)" filter="url(#softGlow)">
      <circle r="28" fill="#7C3AED" stroke="#a855f7" stroke-width="1.5"/>
      <text class="domainLabel" y="1">AI/ML</text>
    </g>

    <!-- FinTech @ 51deg -->
    <g transform="translate(697 334)" filter="url(#softGlow)">
      <circle r="28" fill="#059669" stroke="#10b981" stroke-width="1.5"/>
      <text class="domainLabel" y="1">FinTech</text>
    </g>

    <!-- Trading @ 103deg -->
    <g transform="translate(565 348)" filter="url(#softGlow)">
      <circle r="28" fill="#F59E0B" stroke="#fbbf24" stroke-width="1.5"/>
      <text class="domainLabel" fill="#111" y="1">Trading</text>
    </g>

    <!-- Market Data @ 154deg -->
    <g transform="translate(461 311)" filter="url(#softGlow)">
      <circle r="30" fill="#0e7490" stroke="#06b6d4" stroke-width="1.5"/>
      <text class="domainLabel" y="-4">Market</text>
      <text class="domainLabel" y="8">Data</text>
    </g>

    <!-- APIs @ 206deg -->
    <g transform="translate(461 249)" filter="url(#softGlow)">
      <circle r="26" fill="#dc2626" stroke="#ef4444" stroke-width="1.5"/>
      <text class="domainLabel" y="1">APIs</text>
    </g>

    <!-- Risk @ 257deg -->
    <g transform="translate(565 212)" filter="url(#softGlow)">
      <circle r="26" fill="#9333ea" stroke="#c084fc" stroke-width="1.5"/>
      <text class="domainLabel" y="1">Risk</text>
    </g>

    <!-- Automation @ 309deg -->
    <g transform="translate(697 226)" filter="url(#softGlow)">
      <circle r="32" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.5"/>
      <text class="domainLabel" y="-4">Auto-</text>
      <text class="domainLabel" y="8">mation</text>
    </g>
  </g>

  <!-- ================================ -->
  <!-- CENTER CORE -->
  <!-- ================================ -->
  <circle cx="600" cy="280" r="72" fill="url(#coreBg)" stroke="#00D9FF" stroke-width="2.5" filter="url(#glowStrong)">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="70;74;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="280" r="58" fill="none" stroke="#6C63FF" stroke-width="1" stroke-dasharray="4 6" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 600 280" to="360 600 280" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="268" class="coreTitle">TANMAY</text>
  <text x="600" y="285" class="coreTitle" font-size="14px" letter-spacing="1px">QUANT LAB</text>
  <text x="600" y="302" class="coreSub">BUILD MODE: ON</text>

  <!-- Pulsing dots on center ring -->
  <circle cx="600" cy="208" r="4" fill="#00D9FF" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="672" cy="280" r="4" fill="#6C63FF" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="352" r="4" fill="#F59E0B" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="528" cy="280" r="4" fill="#00D9FF" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- ================================ -->
  <!-- BOTTOM STATUS BAR -->
  <!-- ================================ -->
  <rect x="0" y="472" width="1200" height="28" rx="0" fill="#060c1a" opacity="0.8"/>
  <rect x="20" y="479" width="1160" height="1" fill="#00D9FF" opacity="0.15"/>

  <!-- Status labels -->
  <text x="30" y="490" class="scanLabel">REACTOR STATUS: ACTIVE</text>
  <text x="220" y="490" class="scanLabel" opacity="0.4">|</text>
  <text x="230" y="490" class="scanLabel">ORBIT: NOMINAL</text>
  <text x="370" y="490" class="scanLabel" opacity="0.4">|</text>
  <text x="380" y="490" class="scanLabel">NODES: 16 ONLINE</text>
  <text x="530" y="490" class="scanLabel" opacity="0.4">|</text>
  <text x="540" y="490" class="scanLabel">CORE: TANMAY MANGAL</text>
  <text x="740" y="490" class="scanLabel" opacity="0.4">|</text>
  <text x="750" y="490" class="scanLabel">SYSTEM: FULL STACK + AI + FINTECH</text>

  <!-- Animated progress bar -->
  <rect x="1000" y="482" width="180" height="8" rx="4" fill="#0d1a2e"/>
  <rect x="1000" y="482" width="100" height="8" rx="4" fill="url(#neonCyan)">
    <animate attributeName="width" values="20;180;20" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating star particles -->
  <circle cx="80" cy="120" r="1.5" fill="#00D9FF" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1120" cy="180" r="1.5" fill="#6C63FF" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="380" r="1.5" fill="#F59E0B" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="400" r="1.5" fill="#00D9FF" opacity="0.6">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="250" r="1" fill="#6C63FF" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1145" cy="300" r="1" fill="#F59E0B" opacity="0.5">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>

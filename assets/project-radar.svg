  <text x="100" y="446" class="metricVal">8</text>
  <text x="100" y="464" class="metricLabel">PROJECTS</text>

  <line x1="180" y1="422" x2="180" y2="476" stroke="#1a3050" stroke-width="1"/>

  <text x="270" y="446" class="metricVal" fill="#00ff88">5</text>
  <text x="270" y="464" class="metricLabel">DEPLOYED</text>

  <line x1="350" y1="422" x2="350" y2="476" stroke="#1a3050" stroke-width="1"/>

  <text x="450" y="446" class="metricVal" fill="#F59E0B">2</text>

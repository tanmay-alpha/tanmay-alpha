    <circle cx="665" cy="349" r="4" fill="#ef4444"/>
    <text x="678" y="353" class="projLabel" font-size="11px" text-anchor="start">Crucible</text>
    <text x="840" y="353" class="projSub" text-anchor="start" font-size="10px" fill="#8899cc">C++17 | Rust | ONNX</text>
    <text x="1040" y="353" font-size="10px" fill="#F59E0B" font-weight="700">WIP</text>

    <!-- AI Forensics -->
    <rect x="650" y="368" width="530" height="30" rx="4" fill="#060e16" opacity="0.5"/>
    <circle cx="665" cy="383" r="4" fill="#a855f7"/>
    <text x="678" y="387" class="projLabel" font-size="11px" text-anchor="start">AI Image Forensics</text>
    <text x="840" y="387" class="projSub" text-anchor="start" font-size="10px" fill="#8899cc">Python | PyQt6 | HuggingFace</text>

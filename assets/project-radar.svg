  <line x1="540" y1="422" x2="540" y2="476" stroke="#1a3050" stroke-width="1"/>

  <text x="650" y="446" class="metricVal" fill="#a855f7">4</text>
  <text x="650" y="464" class="metricLabel">TECH DOMAINS</text>

  <line x1="750" y1="422" x2="750" y2="476" stroke="#1a3050" stroke-width="1"/>

  <text x="870" y="446" class="metricVal" fill="#6C63FF">12+</text>
  <text x="870" y="464" class="metricLabel">TECH STACKS</text>

  <line x1="960" y1="422" x2="960" y2="476" stroke="#1a3050" stroke-width="1"/>

  <text x="1080" y="446" class="metricVal" fill="#00D9FF">100%</text>
  <text x="1080" y="464" class="metricLabel">REAL-WORLD</text>

  <!-- Scan line -->
  <rect x="0" y="0" width="1200" height="1.5" fill="#00D9FF" opacity="0.3">
    <animate attributeName="y" values="0;475;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="600" cy="250" r="1.5" fill="#00D9FF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="160" r="1.5" fill="#6C63FF" opacity="0.5">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>

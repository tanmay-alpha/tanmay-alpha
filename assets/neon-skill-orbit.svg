<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f2a60"/>
      <stop offset="45%" stop-color="#101426"/>
      <stop offset="100%" stop-color="#050711"/>
    </radialGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF2E63"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00D9FF" flood-opacity="0.28"/>
    </filter>

    <style>
      .title {
        font: 800 34px 'Segoe UI', Arial, sans-serif;
        fill: #ffffff;
        letter-spacing: 1px;
      }
      .sub {
        font: 600 15px 'Segoe UI', Arial, sans-serif;
        fill: #9ca3ff;
        letter-spacing: 3px;
      }
      .skillText {
        font: 800 17px 'Segoe UI', Arial, sans-serif;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .small {
        font: 700 13px 'Segoe UI', Arial, sans-serif;
        fill: #dbeafe;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .orbit {
        fill: none;
        stroke: url(#neon);
        stroke-width: 2;
        stroke-dasharray: 10 14;
        opacity: 0.55;
      }
      .node {
        filter: url(#cardShadow);
      }
    </style>
  </defs>

  <rect width="1000" height="420" rx="34" fill="url(#bg)"/>

  <g opacity="0.28">
    <path d="M0 340 C180 270 280 410 460 330 C640 250 790 360 1000 270" stroke="#00D9FF" stroke-width="2" fill="none"/>
    <path d="M0 375 C230 285 330 440 520 355 C700 275 835 395 1000 310" stroke="#6C63FF" stroke-width="2" fill="none"/>
    <path d="M0 80 C160 120 270 40 430 85 C650 145 780 35 1000 95" stroke="#FF2E63" stroke-width="2" fill="none"/>
  </g>

  <g opacity="0.75">
    <circle cx="120" cy="85" r="3" fill="#00D9FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="75" r="3" fill="#FF2E63">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="330" r="3" fill="#6C63FF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="320" r="3" fill="#00D9FF">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="500" y="54" class="title" text-anchor="middle">âš¡ SKILLS ORBIT SYSTEM âš¡</text>
  <text x="500" y="84" class="sub" text-anchor="middle">FULL STACK â€¢ AI â€¢ FINTECH â€¢ SYSTEMS â€¢ DEVELOPER TOOLS</text>

  <ellipse class="orbit" cx="500" cy="230" rx="330" ry="105">
    <animateTransform attributeName="transform" type="rotate" from="0 500 230" to="360 500 230" dur="38s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse class="orbit" cx="500" cy="230" rx="245" ry="78" opacity="0.35">
    <animateTransform attributeName="transform" type="rotate" from="360 500 230" to="0 500 230" dur="28s" repeatCount="indefinite"/>
  </ellipse>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 500 230" to="360 500 230" dur="30s" repeatCount="indefinite"/>

    <g class="node" transform="translate(500 108)">
      <rect x="-42" y="-23" width="84" height="46" rx="14" fill="#00599C"/>
      <text class="skillText">C++</text>
    </g>

    <g class="node" transform="translate(705 138)">
      <rect x="-52" y="-23" width="104" height="46" rx="14" fill="#3776AB"/>
      <text class="skillText">Python</text>
    </g>

    <g class="node" transform="translate(835 230)">
      <rect x="-42" y="-23" width="84" height="46" rx="14" fill="#F7DF1E"/>
      <text class="skillText" fill="#111827">JS</text>
    </g>

    <g class="node" transform="translate(705 322)">
      <rect x="-50" y="-23" width="100" height="46" rx="14" fill="#3178C6"/>
      <text class="skillText">TS</text>
    </g>

    <g class="node" transform="translate(500 352)">
      <rect x="-50" y="-23" width="100" height="46" rx="14" fill="#ED8B00"/>
      <text class="skillText">Java</text>
    </g>

    <g class="node" transform="translate(295 322)">
      <rect x="-48" y="-23" width="96" height="46" rx="14" fill="#61DAFB"/>
      <text class="skillText" fill="#06121f">React</text>
    </g>

    <g class="node" transform="translate(165 230)">
      <rect x="-52" y="-23" width="104" height="46" rx="14" fill="#000000"/>
      <text class="skillText">Next.js</text>
    </g>

    <g class="node" transform="translate(295 138)">
      <rect x="-58" y="-23" width="116" height="46" rx="14" fill="#009688"/>
      <text class="skillText">FastAPI</text>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 500 230" to="0 500 230" dur="22s" repeatCount="indefinite"/>

    <g class="node" transform="translate(500 152)">
      <circle r="31" fill="#6DB33F"/>
      <text class="small">Spring</text>
    </g>

    <g class="node" transform="translate(665 180)">
      <circle r="31" fill="#3ECF8E"/>
      <text class="small">Supabase</text>
    </g>

    <g class="node" transform="translate(665 280)">
      <circle r="31" fill="#2496ED"/>
      <text class="small">Docker</text>
    </g>

    <g class="node" transform="translate(500 308)">
      <circle r="31" fill="#FF6F00"/>
      <text class="small">Finance</text>
    </g>

    <g class="node" transform="translate(335 280)">
      <circle r="31" fill="#FFD21E"/>
      <text class="small" fill="#111827">AI/ML</text>
    </g>

    <g class="node" transform="translate(335 180)">
      <circle r="31" fill="#654FF0"/>
      <text class="small">WASM</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <circle cx="500" cy="230" r="64" fill="#0b1022" stroke="url(#neon)" stroke-width="4"/>
    <text x="500" y="218" class="skillText">TANMAY</text>
    <text x="500" y="242" class="small">BUILD MODE</text>
  </g>

  <g opacity="0.8">
    <rect x="285" y="388" width="430" height="8" rx="4" fill="#151b33"/>
    <rect x="285" y="388" width="120" height="8" rx="4" fill="url(#neon)">
      <animate attributeName="x" values="285;595;285" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
